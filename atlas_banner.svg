<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#090514;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#120828;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#a855f7" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="1200" y2="250" stroke="#a855f7" stroke-width="0.5"/>
  </g>

  <!-- Glow from bottom -->
  <rect x="200" y="150" width="800" height="150" fill="url(#glow)" rx="75"/>

  <!-- Left decorative bar -->
  <rect x="30" y="40" width="4" height="220" fill="url(#accent)" rx="2"/>

  <!-- Title -->
  <text x="70" y="110" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="bold" fill="#ffffff" letter-spacing="4">
    ATLAS
  </text>

  <!-- Subtitle -->
  <text x="70" y="155" font-family="'Courier New', Courier, monospace" font-size="18" fill="#a78bfa" letter-spacing="6">
    TQ1.0 TERNARY INFERENCE ENGINE
  </text>

  <!-- Tagline -->
  <text x="70" y="195" font-family="'Courier New', Courier, monospace" font-size="13" fill="#6b7280" letter-spacing="2">
    CPU-based · BitNet b1.58 · Windows / Linux x86-64
  </text>

  <!-- Right side: circuit/tech ornament -->
  <g transform="translate(920, 50)" opacity="0.3">
    <rect x="0" y="0" width="220" height="200" fill="none" stroke="#a855f7" stroke-width="1" rx="8"/>
    <text x="20" y="30" font-family="monospace" font-size="11" fill="#a855f7">INFERENCE</text>
    <text x="20" y="55" font-family="monospace" font-size="10" fill="#6366f1">  prefill: 26.7 tok/s</text>
    <text x="20" y="75" font-family="monospace" font-size="10" fill="#6366f1">  decode:  8.9 tok/s</text>
    <text x="20" y="105" font-family="monospace" font-size="11" fill="#a855f7">MODELS</text>
    <text x="20" y="130" font-family="monospace" font-size="10" fill="#6366f1">  1B · 3B · 7B · 10B</text>
    <text x="20" y="160" font-family="monospace" font-size="11" fill="#a855f7">RAM</text>
    <text x="20" y="185" font-family="monospace" font-size="10" fill="#6366f1">  1.9 GB · 4.7 GB · 8.9 GB · 11.9 GB</text>

    <!-- Corner brackets -->
    <path d="M 0 0 L 0 0 L 0 0" fill="none"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="30" y="270" width="1140" height="1" fill="url(#accent)" opacity="0.3"/>
  <rect x="30" y="273" width="200" height="2" fill="url(#accent)" rx="1"/>

  <!-- Version badge -->
  <rect x="70" y="218" width="65" height="22" fill="none" stroke="#7c3aed" stroke-width="1.5" rx="11"/>
  <text x="102" y="233" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">v1.0.2</text>
</svg>
